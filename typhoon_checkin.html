<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7/10 颱風天出勤回報</title>
<style>
  :root{
    --navy:#0F1B2D;
    --panel:#182642;
    --panel-2:#1F3050;
    --amber:#F5A623;
    --danger:#E24C4C;
    --ok:#3FB68A;
    --text:#EDEFF3;
    --muted:#8592AC;
    --line:#2A3B5C;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--navy);
    color:var(--text);
    font-family:'Noto Sans TC', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    padding-bottom:110px;
  }
  .warning-stripe{
    height:10px;
    background:repeating-linear-gradient(
      135deg,
      var(--amber) 0px, var(--amber) 14px,
      var(--danger) 14px, var(--danger) 28px
    );
  }
  header{
    padding:22px 20px 16px;
    background:linear-gradient(180deg, var(--panel) 0%, var(--navy) 100%);
    border-bottom:1px solid var(--line);
  }
  .eyebrow{
    font-family:'Courier New', monospace;
    letter-spacing:2px;
    font-size:12px;
    color:var(--amber);
    text-transform:uppercase;
    margin-bottom:6px;
  }
  h1{
    margin:0 0 4px;
    font-size:26px;
    font-weight:800;
    letter-spacing:0.5px;
  }
  .sub{
    color:var(--muted);
    font-size:14px;
    line-height:1.5;
  }
  .step-label{
    margin:20px 20px 8px;
    font-size:12.5px;
    color:var(--muted);
    letter-spacing:1px;
  }
  .search{
    margin:0 20px 8px;
  }
  .search input{
    width:100%;
    padding:12px 14px;
    border-radius:10px;
    border:1px solid var(--line);
    background:var(--panel);
    color:var(--text);
    font-size:15px;
    outline:none;
  }
  .search input:focus{border-color:var(--amber);}
  .search input::placeholder{color:var(--muted);}
  .list{
    margin:10px 20px 0;
    display:flex;
    flex-direction:column;
    gap:8px;
    max-height:44vh;
    overflow-y:auto;
    padding-bottom:4px;
  }
  .name-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:13px 14px;
    cursor:pointer;
    transition:border-color .15s ease, background .15s ease;
  }
  .name-row:hover{border-color:var(--amber);}
  .name-row.selected{
    border-color:var(--amber);
    background:var(--panel-2);
  }
  .name-row .name{
    font-size:15.5px;
    font-weight:600;
  }
  .name-row .check{
    width:20px;height:20px;
    border-radius:50%;
    border:2px solid var(--line);
    flex-shrink:0;
  }
  .name-row.selected .check{
    border-color:var(--amber);
    background:var(--amber);
  }
  .selected-panel{
    margin:18px 20px 0;
    padding:18px 16px;
    background:var(--panel-2);
    border:1px solid var(--amber);
    border-radius:14px;
    display:none;
  }
  .selected-panel.show{display:block;}
  .selected-panel .who{
    font-size:13px;
    color:var(--muted);
    margin-bottom:4px;
  }
  .selected-panel .who b{color:var(--amber);}
  .selected-panel .q{
    font-size:16px;
    font-weight:700;
    margin-bottom:14px;
  }
  .attend-toggle{
    display:flex;
    gap:10px;
  }
  .attend-toggle button{
    flex:1;
    padding:14px 0;
    border-radius:10px;
    border:1px solid var(--line);
    background:var(--panel);
    color:var(--text);
    font-size:15px;
    font-weight:700;
    cursor:pointer;
  }
  .attend-toggle button.pick-yes.active{
    background:var(--ok);
    border-color:var(--ok);
    color:#08281c;
  }
  .attend-toggle button.pick-no.active{
    background:var(--danger);
    border-color:var(--danger);
    color:#2b0a0a;
  }
  .footer-bar{
    position:fixed;
    bottom:0;left:0;right:0;
    background:linear-gradient(180deg, rgba(15,27,45,0), var(--navy) 25%);
    padding:18px 20px 20px;
  }
  .submit-btn{
    width:100%;
    padding:15px;
    border-radius:12px;
    border:none;
    background:var(--amber);
    color:#2b1900;
    font-size:16px;
    font-weight:800;
    cursor:pointer;
    letter-spacing:1px;
  }
  .submit-btn:disabled{
    background:#3a4257;
    color:#7c8aa0;
    cursor:not-allowed;
  }
  .status-msg{
    text-align:center;
    font-size:13px;
    color:var(--muted);
    margin-top:8px;
    min-height:16px;
  }
  .status-msg.ok{color:var(--ok);}
  .status-msg.err{color:var(--danger);}
  .done-screen{
    display:none;
    text-align:center;
    padding:80px 30px;
  }
  .done-screen.show{display:block;}
  .done-screen .icon{font-size:44px;margin-bottom:16px;}
  .done-screen h2{margin:0 0 8px;font-size:20px;}
  .done-screen p{color:var(--muted);font-size:14px;}
</style>
</head>
<body>

<div class="warning-stripe"></div>

<header>
  <div class="eyebrow">TYPHOON REPORT · 7/10</div>
  <h1>颱風天出勤回報</h1>
  <div class="sub">請點選「你自己的名字」,回報 7/10 (五) 是否有到公司上班。每人只需回報自己這一筆。</div>
</header>

<div id="formArea">
  <div class="step-label">STEP 1 · 找到你的名字</div>
  <div class="search">
    <input type="text" id="searchInput" placeholder="搜尋姓名...">
  </div>
  <div class="list" id="list"></div>

  <div class="selected-panel" id="selectedPanel">
    <div class="who">你選擇的是 <b id="selectedName"></b></div>
    <div class="q">7/10 (五) 你有到公司上班嗎?</div>
    <div class="attend-toggle">
      <button class="pick-yes" id="pickYes">✓ 有來</button>
      <button class="pick-no" id="pickNo">✕ 沒來</button>
    </div>
  </div>

  <div style="height:170px;"></div>
</div>

<div class="done-screen" id="doneScreen">
  <div class="icon">✓</div>
  <h2>回報完成,謝謝你!</h2>
  <p id="doneDetail"></p>
</div>

<div class="footer-bar" id="footerBar">
  <button class="submit-btn" id="submitBtn" disabled>送出我的回報</button>
  <div class="status-msg" id="statusMsg"></div>
</div>

<script>
// ====== 名單 (25人, 依群組成員清單) ======
const members = [
  "Taylor",
  "Boris",
  "calvin chen",
  "Eddy Sheen",
  "Johnny",
  "Leslie Wang 王德邦",
  "MIKE 家弘",
  "Peter Chen",
  "Rain",
  "Ted Fang",
  "wei",
  "Yi-Ren Chen",
  "周德明",
  "徐維濬",
  "林峻豪",
  "林志明",
  "柯明鑫(綺又爸爸)",
  "欣怡",
  "沈柏彤 Eros",
  "泳霖kobe",
  "莊茗翔",
  "藍榮賢",
  "鄒立德",
  "顧憲昇 Alex",
  "yu-syuan"
];

// ====== 請將下面換成你自己部署的 Google Apps Script Web App URL ======
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyDvd7ox-AlYSiF81Zm6wtwOuJIZvONUawmBAo0r2TnxBjUFhEqpiwO57vDVBGKKB0h/exec";

let selectedName = null;   // 這台裝置的使用者選了哪個名字
let selectedAttend = null; // "yes" | "no" | null

const listEl = document.getElementById('list');
const searchInput = document.getElementById('searchInput');
const selectedPanel = document.getElementById('selectedPanel');
const selectedNameEl = document.getElementById('selectedName');
const pickYesBtn = document.getElementById('pickYes');
const pickNoBtn = document.getElementById('pickNo');
const submitBtn = document.getElementById('submitBtn');

function render(filter=""){
  listEl.innerHTML = "";
  const f = filter.trim().toLowerCase();
  members.forEach(name => {
    if(f && !name.toLowerCase().includes(f)) return;
    const row = document.createElement('div');
    row.className = 'name-row' + (name === selectedName ? ' selected' : '');

    const nameEl = document.createElement('div');
    nameEl.className = 'name';
    nameEl.textContent = name;

    const check = document.createElement('div');
    check.className = 'check';

    row.appendChild(nameEl);
    row.appendChild(check);

    row.onclick = () => {
      selectedName = name;
      selectedAttend = null; // 換人重選時,清空有來/沒來的選擇
      render(searchInput.value);
      openSelectedPanel();
    };

    listEl.appendChild(row);
  });
}

function openSelectedPanel(){
  selectedNameEl.textContent = selectedName;
  selectedPanel.classList.add('show');
  refreshAttendButtons();
  updateSubmitState();
  selectedPanel.scrollIntoView({ behavior:'smooth', block:'center' });
}

function refreshAttendButtons(){
  pickYesBtn.classList.toggle('active', selectedAttend === 'yes');
  pickNoBtn.classList.toggle('active', selectedAttend === 'no');
}

pickYesBtn.onclick = () => { selectedAttend = 'yes'; refreshAttendButtons(); updateSubmitState(); };
pickNoBtn.onclick = () => { selectedAttend = 'no'; refreshAttendButtons(); updateSubmitState(); };

function updateSubmitState(){
  submitBtn.disabled = !(selectedName && selectedAttend);
}

searchInput.addEventListener('input', (e) => render(e.target.value));

submitBtn.onclick = async () => {
  const statusMsg = document.getElementById('statusMsg');
  if(!selectedName || !selectedAttend){
    statusMsg.className = 'status-msg err';
    statusMsg.textContent = '請先選擇你的名字並勾選有來/沒來。';
    return;
  }

  submitBtn.disabled = true;
  statusMsg.className = 'status-msg';
  statusMsg.textContent = '送出中...';

  // Apps Script 端維持不變:仍是接收 records 陣列並逐筆寫入,
  // 這裡只是每次都只送出「這個人自己」這一筆。
  const payload = {
    date: "2026-07-10",
    submittedAt: new Date().toISOString(),
    records: [
      { name: selectedName, attended: selectedAttend === 'yes' }
    ]
  };

  try{
    if(GOOGLE_SCRIPT_URL.includes("YOUR_DEPLOYMENT_ID")){
      throw new Error("尚未設定 Google Apps Script URL");
    }
    await fetch(GOOGLE_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });

    document.getElementById('formArea').style.display = 'none';
    document.getElementById('footerBar').style.display = 'none';
    const doneScreen = document.getElementById('doneScreen');
    document.getElementById('doneDetail').textContent =
      `${selectedName} · 7/10 ${selectedAttend === 'yes' ? '有來上班' : '沒有來上班'}`;
    doneScreen.classList.add('show');
  }catch(err){
    statusMsg.className = 'status-msg err';
    statusMsg.textContent = '送出失敗:' + err.message;
    submitBtn.disabled = false;
  }
};

render();
</script>

</body>
</html>
